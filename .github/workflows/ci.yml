name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Setup npm
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Run linters
        run: npm run lint

      - name: Run Stylelint
        run: npm run stylelint

      - name: Build app
        run: npm run build
